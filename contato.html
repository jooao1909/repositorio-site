<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <style>
        body {
            font-family: Arial;
            max-width: 1200px;
            padding: 20px;
            line-height: 1.6;
            background-color: #f5f5f5;
        }

        .info {
            background: white;
            padding: 30px;
        }

        .contato {
            background: #f8f9fa;
        }

        .whazapp {
            align-items: center;
            background: #25D366;
            color: white;
            padding: 12px 17px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
        }

        .enviar {
            background: white;
            padding: 30px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 16px;
        }

        .botão {
            background: #0e1920;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
        }

        .voltar {
            display: inline-block;
            margin-top: 30px;
            color: #22282c;
            text-decoration: none;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <h1>Entre em Contato</h1>
    <div class="subtitulo">Fale conosco sobre placas de vídeo, dúvidas ou sugestões!</div>

    <div class="contact-container">
        <div class="info">
            <h2>Contato Direto</h2>
            
            <div class="contato">
                <h3>WhatsApp</h3>
                <p>Aqui o contato do whatsapp caso queira falar algo!</p>
                <a href="https://wa.me/5534997774198?text=Gostei%20do%20seu%20site!" 
                   class="whazapp" 
                   target="_blank">
                    WhatsApp
                </a>
            </div>
            <div class="contato">
                <h3>E-mail</h3>
                <p>Aqui o email se tiver algo pra mandar também!</p>
                <p><strong>joaofernandopf@edu.uniube.br</strong></p>
            </div>
        </div>

        <div class="enviar">
            <h2>Envie uma Mensagem</h2>
            <form id="contactForm">
                <div class="enviar">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="enviar">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="enviar">
                    <label for="assunto">Assunto</label>
                    <select id="assunto" name="assunto" required>
                        <option value="">Selecione:</option>
                        <option value="duvida">Dúvida sobre placa de vídeo</option>
                        <option value="sugestao">Sugestão de conteúdo</option>
                        <option value="correcao">Correção de informação</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>

                <div class="enviar">
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem aqui" required></textarea>
                </div>
                <button class="botão">Enviar Mensagem</button>
                <div id="feedback" class="feedback"></div>
            </form>
        </div>
    </div>

    <center>
        <a href="index.html" class="voltar">Voltar para a página inicial</a>
    </center>

        
</html>
